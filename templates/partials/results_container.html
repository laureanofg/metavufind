<div id="results-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">
            <i class="bi bi-list-check"></i>
            Resultados para: <span class="text-primary">"{{ query }}"</span>
        </h4>
        <a
            href="/api/export?query={{ query }}&max_results={{ max_results }}"
            class="btn btn-success"
            download
            onclick="this.classList.add('disabled')"
        >
            <i class="bi bi-file-earmark-excel"></i> Descargar Excel
        </a>
    </div>

    <ul class="nav nav-tabs mb-3" id="resultsTabs" role="tablist">
        {% for target in targets %}
        <li class="nav-item" role="presentation">
            <button
                class="nav-link {{ 'active' if loop.first else '' }}"
                id="tab-{{ target.id }}"
                data-bs-toggle="tab"
                data-bs-target="#content-{{ target.id }}"
                type="button"
                role="tab"
                hx-get="/api/search/{{ target.id }}?query={{ query }}&max_results={{ max_results }}"
                hx-trigger="click once"
                hx-target="#content-{{ target.id }}"
                hx-indicator="#indicator-{{ target.id }}"
                aria-selected="{{ 'true' if loop.first else 'false' }}"
            >
                {{ target.name }}
            </button>
        </li>
        {% endfor %}
    </ul>

    <div class="tab-content" id="resultsTabsContent">
        {% for target in targets %}
        <div
            class="tab-pane fade {{ 'show active' if loop.first else '' }}"
            id="content-{{ target.id }}"
            role="tabpanel"
        >
            <div id="indicator-{{ target.id }}" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-2 text-muted">Cargando resultados de {{ target.name }}...</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
