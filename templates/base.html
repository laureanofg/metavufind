<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MetaVufindScraping{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-search"></i> MetaVufindScraping

            <span class="navbar-text text-white-50 small">
                Metabuscador academico via VUFIND

        </div>

        {% block content %}{% endblock %}

    <footer class="mt-5 py-3 text-center text-muted small border-top">
        MetaVufindScraping - Busqueda en <a href="https://descubridor.americana.edu.co" target="_blank">Americana VUFIND</a>
